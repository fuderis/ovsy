[package]
name = "ovsy"
edition = "2024"

[lib]
name = "root"

[dependencies]
macron = { version = "^0.1.14", features = ["full"] }
atoman = { version = "^0.2.6", features = ["full"] }
tokio = { version = "1.48.0", features = ["full"] }
reqwest = { version = "0.13.1", features = ["json", "stream"] }
axum = "0.8.8"
anylm = "0.1.6"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.148"
toml = "1.0.0"
clap = { version = "4.5.53", features = ["derive"] }
chrono = { version = "0.4.42", features = ["serde"] }
regex = "1.12.2"
lancedb = "0.27.1"
arrow-array = "57.3.0"
arrow-schema = "57.3.0"
serde_arrow = { version = "0.14.0", features = ["arrow-57"] }
rand = "0.10.0"
