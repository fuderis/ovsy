[workspace]
members = ["crates/cli", "crates/server", "crates/shared"]
default-members = ["crates/cli", "crates/server"]
resolver = "3"

[workspace.dependencies]
ovsy-shared = { path = "crates/shared" }
fudes-server = { package = "fudes", version = "0.1.1", features = ["basic", "server"] }
fudes-basic = { package = "fudes", version = "0.1.1", features = ["basic"] }
anylm = { version = "0.1.13" }
tokio = { version = "1.51.0", features = ["full"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
toml = "1.0.0"
clap = { version = "4.5.53", features = ["derive"] }
reqwest = { version = "0.13.1", features = ["json", "stream"] }
chrono = { version = "0.4.42", features = ["serde"] }
regex = "1.12.2"
ratatui = "0.30.0"
crossterm = "0.29.0"
textwrap = "0.16.2"
hyperrat = "0.1.1"
unicode-width = "0.2.2"
colored = "3.1.1"
